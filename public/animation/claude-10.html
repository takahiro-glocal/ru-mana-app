<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>るうまな — Intro: ただひとりの人間</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,200;1,9..144,300&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/4.1.3/css/flag-icons.min.css">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:    #FBF7EE;
  --ink:   #1A1612;
  --green: #85C441;
  --pink:  #E4007F;
  --gold:  #E8A800;
  --warm:  #F2C97D;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  background: #0a0806;
  font-family: 'Noto Serif JP', serif;
}

/* ═══ Warm background ═══ */
#bg-warm {
  position: absolute; inset:0; z-index:0;
  background: var(--bg);
  opacity: 0;
  transition: opacity 1.2s ease;
}
#bg-warm.visible { opacity: 1; }

/* ═══ Canvas for connection lines ═══ */
canvas#connections {
  position: absolute; inset:0; width:100%; height:100%;
  z-index: 5; pointer-events: none;
}

/* ═══ Entity (flag + person silhouette) ═══ */
#entities {
  position: absolute; inset:0; z-index:10;
  pointer-events: none;
}
.entity {
  position: absolute;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.5s ease;
}
.entity.visible { opacity: 1; }
.entity.converge {
  transition: opacity 0.6s ease;
  opacity: 0;
}

/* Flag circle — using flag-icon v4.1.3 class names */
.flag-circle {
  display: block !important;
  border-radius: 50% !important;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12), 0 0 0 1.5px rgba(255,255,255,0.35) inset;
  transition: filter 1.4s ease, opacity 1.4s ease, transform 1.4s ease;
  position: relative;
  z-index: 2;
  background-size: cover !important;
  background-position: center !important;
}
.entity.rack-focus .flag-circle {
  filter: blur(3px);
  opacity: 0.15;
  transform: scale(0.7);
}

/* Person silhouette — appears behind the flag on rack-focus */
.person-figure {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -45%) scale(0.3);
  opacity: 0;
  z-index: 1;
  transition: opacity 1.2s ease 0.15s, transform 1.2s cubic-bezier(.23,1,.32,1) 0.15s;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
}
.entity.rack-focus .person-figure {
  opacity: 1;
  transform: translate(-50%, -45%) scale(1);
}

/* Warm glow behind person */
.person-glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, rgba(242,201,125,0.35) 0%, rgba(242,201,125,0) 70%);
  opacity: 0;
  z-index: 0;
  transition: opacity 1.4s ease 0.3s;
}
.entity.rack-focus .person-glow {
  opacity: 1;
}

/* ═══ Text overlay ═══ */
#text-overlay {
  position: absolute; inset:0;
  display: flex; align-items: center; justify-content: center;
  z-index: 20; pointer-events: none;
}
.phrase {
  position: absolute;
  text-align: center;
  padding: 0 24px;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.7s ease, transform 0.7s cubic-bezier(.23,1,.32,1);
}
.phrase.visible {
  opacity: 1;
  transform: translateY(0);
}
.phrase.gone {
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.45s ease, transform 0.45s ease;
}
.phrase-card {
  display: inline-block;
  background: rgba(251,247,238,0.82);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px;
  padding: 18px 36px 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  border: 1px solid rgba(255,255,255,0.4);
}
.phrase .jp {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: clamp(16px, 2.8vw, 28px);
  color: var(--ink);
  letter-spacing: 0.16em;
  line-height: 1.8;
  display: block;
}
.phrase .en {
  font-family: 'Fraunces', serif;
  font-style: italic; font-weight: 200;
  font-size: clamp(10px, 1.5vw, 14px);
  color: rgba(26,22,18,0.40);
  letter-spacing: 0.08em;
  margin-top: 4px;
  display: block;
}

/* ═══ Logo finale ═══ */
#logo-layer {
  position: absolute; inset:0;
  display: flex; align-items: center; justify-content: center;
  z-index: 25; pointer-events: none;
}
#logo-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(253,252,249,0.60);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 32px;
  padding: clamp(28px,5vw,48px) clamp(40px,10vw,84px) clamp(24px,4vw,40px);
  box-shadow: 0 8px 48px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.6) inset;
  border: 1px solid rgba(255,255,255,0.5);
  opacity: 0;
  transform: scale(0.82) translateY(20px);
  transition: opacity 0.65s ease, transform 0.65s cubic-bezier(.23,1,.32,1);
}
#logo-card.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

.logo-jp {
  font-family: 'Noto Serif JP', serif;
  font-weight: 400;
  font-size: clamp(34px, 8vw, 70px);
  color: var(--ink);
  letter-spacing: 0.22em;
  line-height: 1;
  opacity: 0; transform: translateY(14px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.23,1,.32,1);
}
.logo-jp.visible { opacity:1; transform:translateY(0); }

.logo-divider {
  width: 0; height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(26,22,18,0.16), transparent);
  margin: clamp(10px,2vw,16px) 0;
  transition: width 0.5s ease;
}
.logo-divider.visible { width: 80%; }

.logo-en {
  font-family: 'Fraunces', serif; font-style:italic; font-weight:300;
  font-size: clamp(17px,3.4vw,30px);
  color: rgba(26,22,18,0.62); letter-spacing:0.06em;
  opacity:0; transform:translateY(8px);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.23,1,.32,1);
}
.logo-en.visible { opacity:1; transform:translateY(0); }

.logo-dot {
  color: var(--green); display:inline-block;
  transform: scale(0);
  transition: transform 0.4s cubic-bezier(.36,1.56,.64,1);
}
.logo-dot.visible { transform:scale(1); }

.logo-tag {
  font-family:'Zen Kaku Gothic New',sans-serif; font-weight:400;
  font-size:clamp(10px,1.8vw,14px);
  color:rgba(26,22,18,0.50); letter-spacing:0.22em;
  margin-top:clamp(6px,1.5vw,10px);
  opacity:0;
  transition: opacity 0.6s ease;
}
.logo-tag.visible { opacity:1; }

/* ═══ Progress bar ═══ */
#bar {
  position:absolute; bottom:0; left:0; height:2px;
  background:linear-gradient(90deg, var(--green), var(--pink), var(--gold));
  width:0%; z-index:100;
}

/* ═══ Replay ═══ */
#replay {
  position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
  font-family:'Zen Kaku Gothic New',sans-serif;
  font-size:11px; color:rgba(26,22,18,0.22); letter-spacing:0.1em;
  opacity:0; z-index:50;
  transition: opacity 0.6s ease;
  cursor:pointer;
}
#replay.visible { opacity:1; pointer-events:auto; }
</style>
</head>
<body>

<div id="bg-warm"></div>
<canvas id="connections"></canvas>
<div id="entities"></div>

<div id="text-overlay">
  <div class="phrase" id="ph1">
    <span class="phrase-card">
      <span class="jp">目の前にいるのは、ただひとりの人間。</span>
      <span class="en">Before any label — a person.</span>
    </span>
  </div>
  <div class="phrase" id="ph2">
    <span class="phrase-card">
      <span class="jp">世界中に、ともだちができる。</span>
      <span class="en">Friends across every horizon.</span>
    </span>
  </div>
</div>

<div id="logo-layer">
  <div id="logo-card">
    <div class="logo-jp">るうまな</div>
    <div class="logo-divider"></div>
    <div class="logo-en">ru<span style="color:var(--pink)">-</span>mana<span class="logo-dot">.</span></div>
    <div class="logo-tag">異文化の摩擦を、理解へ。</div>
  </div>
</div>

<div id="bar"></div>
<div id="replay">click to replay</div>

<script>
/* ═══════════════════════════════════════════════════════
   FLAGS — diverse selection from every continent
   ═══════════════════════════════════════════════════════ */
const FLAGS = [
  'jp','kr','cn','th','vn','in','ph','id','my','tw','sg','au','nz',
  'gb','fr','de','it','es','nl','se','pt','ch','pl','no','fi','ie','dk',
  'us','ca','br','mx','ar','co','cl','pe','jm',
  'za','ng','eg','ke','tr','ae','ma','gh',
];
const N = FLAGS.length;

/* ═══════════════════════════════════════════════════════
   SKIN TONES & CLOTHING — diversity in the silhouettes
   ═══════════════════════════════════════════════════════ */
const SKINS = [
  '#FDBCB4','#F1C27D','#E0AC69','#C68642','#8D5524',
  '#FFCBA4','#FFE0BD','#D4A574','#A67B5B','#F5D6C3',
];
const TOPS = [
  '#E4007F','#85C441','#4A90D9','#F5C842','#E05A2B',
  '#7B4EA0','#00897B','#D32F2F','#1565C0','#F57F17',
  '#558B2F','#AD1457','#FF7043','#5C6BC0','#26A69A',
];

/* ═══════════════════════════════════════════════════════
   PERSON SVG GENERATOR — simple rounded silhouette
   Each person has unique skin + clothing color
   ═══════════════════════════════════════════════════════ */
function personSVG(skin, top, w, h) {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 28 44">
    <!-- head -->
    <circle cx="14" cy="7.5" r="6" fill="${skin}"/>
    <!-- body / torso -->
    <path d="M7 16.5 C7 15 9 14 14 14 C19 14 21 15 21 16.5 L22 28 C22 29.5 21 30 20 30 L8 30 C7 30 6 29.5 6 28 Z"
          fill="${top}"/>
    <!-- left arm -->
    <path d="M7 17 C4 18 2.5 22 3 26 C3.3 28 5 27.5 5.2 26 L7 20"
          fill="${skin}"/>
    <!-- right arm -->
    <path d="M21 17 C24 18 25.5 22 25 26 C24.7 28 23 27.5 22.8 26 L21 20"
          fill="${skin}"/>
    <!-- left leg -->
    <rect x="8.5" y="29" width="4.5" height="12" rx="2.2" fill="${top}" opacity="0.7"/>
    <!-- right leg -->
    <rect x="15" y="29" width="4.5" height="12" rx="2.2" fill="${top}" opacity="0.7"/>
    <!-- shoes -->
    <ellipse cx="10.8" cy="41.5" rx="3" ry="2" fill="#5D4037"/>
    <ellipse cx="17.2" cy="41.5" rx="3" ry="2" fill="#5D4037"/>
  </svg>`;
}

/* ═══════════════════════════════════════════════════════
   CANVAS
   ═══════════════════════════════════════════════════════ */
const cvs = document.getElementById('connections');
const ctx = cvs.getContext('2d');
let W, H;
function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ═══════════════════════════════════════════════════════
   ENTITY CREATION
   ═══════════════════════════════════════════════════════ */
const entities = [];
const container = document.getElementById('entities');

function flagSize() { return Math.round(Math.min(W, H) * 0.065); }
function figureH() { return Math.round(flagSize() * 1.3); }

function randomPos(pad) {
  return {
    x: pad + Math.random() * (W - pad * 2),
    y: pad + Math.random() * (H - pad * 2),
  };
}

function createEntities() {
  container.innerHTML = '';
  entities.length = 0;
  const sz  = flagSize();
  const fh  = figureH();
  const fw  = Math.round(fh * 28 / 44);
  const pad = sz * 1.5;
  const glowSz = sz * 2.2;

  for (let i = 0; i < N; i++) {
    const pos = randomPos(pad);
    const skin = SKINS[i % SKINS.length];
    const top  = TOPS[i % TOPS.length];

    const el = document.createElement('div');
    el.className = 'entity';
    el.innerHTML = `
      <span class="flag-icon flag-icon-squared flag-icon-${FLAGS[i]} flag-circle"
            style="width:${sz}px;height:${sz}px;"></span>
      <div class="person-figure"
           style="width:${fw}px;height:${fh}px;">
        ${personSVG(skin, top, fw, fh)}
      </div>
      <div class="person-glow"
           style="width:${glowSz}px;height:${glowSz}px;"></div>
    `;
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    container.appendChild(el);

    entities.push({
      el,
      x: pos.x, y: pos.y,
      tx: pad + Math.random() * (W - pad * 2),
      ty: pad + Math.random() * (H - pad * 2),
      phase: Math.random() * Math.PI * 2,
      delay: i * 0.045,
    });
  }
}

/* ═══════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════ */
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function lerp(a, b, t)  { return a + (b - a) * t; }

/* ═══════════════════════════════════════════════════════
   CONNECTION LINES — warm golden threads between people
   ═══════════════════════════════════════════════════════ */
function drawConnections(progress) {
  ctx.clearRect(0, 0, W, H);
  if (progress <= 0) return;

  const maxDist = Math.min(W, H) * 0.25;

  for (let i = 0; i < N; i++) {
    const a = entities[i];
    for (let j = i + 1; j < N; j++) {
      const b = entities[j];
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > maxDist) continue;

      const strength = 1 - dist / maxDist;
      const alpha = strength * progress * 0.38;

      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(232,168,0,${alpha})`;
      ctx.lineWidth = 1 + strength * 1.2;
      ctx.stroke();
    }
  }
}

/* ═══════════════════════════════════════════════════════
   TIMELINE — ~10 seconds

   0.0s       Background warms from dark
   0.2–2.2s   Flag circles appear staggered
   2.5s       Phrase 1: "目の前にいるのは、ただひとりの人間。"
   3.0–4.5s   Rack focus: flags blur/shrink → person figures emerge
   4.8s       Phrase 1 fades
   5.2s       Phrase 2: "世界中に、ともだちができる。"
   5.2–6.8s   Golden connection lines grow
   7.0s       Phrase 2 fades
   7.2s       Everything drifts to center & fades
   7.8s       Logo card appears
   7.9–9.2s   Logo cascade
   10.0s      Settled
   ═══════════════════════════════════════════════════════ */
const TOTAL = 10.5;
let startTime = 0;
let rackFocused = false;
let connectProgress = 0;
let converging = false;
let logoShown = false;

function show(id) { document.getElementById(id)?.classList.add('visible'); }
function hide(id) {
  const el = document.getElementById(id);
  if (el) { el.classList.remove('visible'); el.classList.add('gone'); }
}

function animate(ts) {
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) / 1000;
  document.getElementById('bar').style.width = clamp(elapsed / TOTAL * 100, 0, 100) + '%';

  /* Background warm-up */
  if (elapsed >= 0.1) show('bg-warm');

  /* Show flags staggered */
  entities.forEach((e) => {
    if (elapsed >= 0.2 + e.delay && !e.el.classList.contains('visible') && !converging) {
      e.el.classList.add('visible');
    }
  });

  /* Gentle float + drift */
  entities.forEach((e) => {
    if (!e.el.classList.contains('visible')) return;
    const t = elapsed * 0.6;
    const floatX = Math.sin(t + e.phase) * 6;
    const floatY = Math.cos(t * 0.7 + e.phase * 1.3) * 5;

    if (elapsed > 2.5 && elapsed < 7.2) {
      e.x = lerp(e.x, e.tx, 0.003);
      e.y = lerp(e.y, e.ty, 0.003);
    }

    if (elapsed > 7.2) {
      e.x = lerp(e.x, W / 2, 0.04);
      e.y = lerp(e.y, H / 2, 0.04);
    }

    e.el.style.left = (e.x + floatX) + 'px';
    e.el.style.top  = (e.y + floatY) + 'px';
  });

  /* Phrase 1 */
  if (elapsed >= 2.5 && elapsed < 2.6) show('ph1');
  if (elapsed >= 4.8 && elapsed < 4.9) hide('ph1');

  /* Rack focus: flags blur → person silhouettes emerge */
  if (elapsed >= 3.0 && !rackFocused) {
    rackFocused = true;
    entities.forEach((e, i) => {
      setTimeout(() => e.el.classList.add('rack-focus'), i * 30);
    });
  }

  /* Phrase 2 */
  if (elapsed >= 5.2 && elapsed < 5.3) show('ph2');
  if (elapsed >= 7.0 && elapsed < 7.1) hide('ph2');

  /* Connection lines */
  if (elapsed > 5.2 && elapsed < 7.5) {
    connectProgress = clamp((elapsed - 5.2) / 1.8, 0, 1);
  } else if (elapsed >= 7.5) {
    connectProgress = Math.max(0, connectProgress - 0.05);
  }
  drawConnections(connectProgress);

  /* Convergence */
  if (elapsed >= 7.2 && !converging) {
    converging = true;
    entities.forEach((e, i) => {
      setTimeout(() => e.el.classList.add('converge'), i * 15);
    });
  }

  /* Logo */
  if (elapsed >= 7.8 && !logoShown) {
    logoShown = true;
    document.getElementById('logo-card').classList.add('visible');
    setTimeout(() => document.querySelector('.logo-jp').classList.add('visible'), 120);
    setTimeout(() => document.querySelector('.logo-divider').classList.add('visible'), 300);
    setTimeout(() => document.querySelector('.logo-en').classList.add('visible'), 420);
    setTimeout(() => document.querySelector('.logo-dot').classList.add('visible'), 620);
    setTimeout(() => document.querySelector('.logo-tag').classList.add('visible'), 750);
  }

  /* Replay hint */
  if (elapsed >= 10.0) {
    document.getElementById('replay').classList.add('visible');
  }

  if (elapsed < TOTAL + 3) {
    requestAnimationFrame(animate);
  }
}

/* ═══════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════ */
document.fonts.ready.then(() => {
  createEntities();
  requestAnimationFrame(animate);
});

window.addEventListener('resize', () => {
  resize();
  const sz = flagSize();
  const fh = figureH();
  const fw = Math.round(fh * 28 / 44);
  const glowSz = sz * 2.2;
  entities.forEach(e => {
    const flag = e.el.querySelector('.flag-circle');
    const fig  = e.el.querySelector('.person-figure');
    const glow = e.el.querySelector('.person-glow');
    if (flag) { flag.style.width = sz+'px'; flag.style.height = sz+'px'; }
    if (fig)  { fig.style.width = fw+'px'; fig.style.height = fh+'px'; }
    if (glow) { glow.style.width = glowSz+'px'; glow.style.height = glowSz+'px'; }
  });
});

document.body.addEventListener('click', () => location.reload());
</script>
</body>
</html>
